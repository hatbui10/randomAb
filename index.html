<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tỷ lệ 0/1 Slider</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #22d3ee;
            --accent-color: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { font-size: 1.4rem; margin-bottom: 30px; color: var(--primary-color); letter-spacing: 1px; }

        /* --- Thanh gạt (Slider) Custom --- */
        .slider-container {
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: var(--accent-color);
            outline: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        /* Hiển thị con số tỷ lệ */
        .ratio-display {
            display: flex;
            justify-content: space-between;
            margin: 15px 0 30px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .ratio-display span b { color: var(--primary-color); font-size: 1.3rem; }

        .btn-random {
            background: linear-gradient(135deg, #22d3ee 0%, #0891b2 100%);
            color: #0f172a;
            border: none;
            padding: 16px;
            font-size: 1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            width: 60%;
            margin-bottom: 25px;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-random:active { transform: scale(0.96); }

        /* 6 ô kết quả hình vuông */
        .result-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .result-box {
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--accent-color);
            color: var(--primary-color);
            border-radius: 12px;
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            margin: 4px auto;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: 'Consolas', monospace;
            transition: 0.3s;
        }

        .pop { animation: pulse 0.3s ease-out; border-color: var(--primary-color); background: #1e293b; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>TỶ LỆ NGẪU NHIÊN</h2>
        
        <div class="slider-container">
            <input type="range" min="0" max="6" value="3" class="slider" id="ratioSlider">
        </div>

        <div class="ratio-display">
            <span>Số 0: <b id="val0">3</b></span>
            <span>Số 1: <b id="val1">3</b></span>
        </div>

        <button class="btn-random" onclick="generateRandom()">TẠO NGẪU NHIÊN</button>

        <div class="result-container">
            <div class="result-box" id="box0"></div>
            <div class="result-box" id="box1"></div>
            <div class="result-box" id="box2"></div>
            <div class="result-box" id="box3"></div>
            <div class="result-box" id="box4"></div>
            <div class="result-box" id="box5"></div>
        </div>
    </div>

    <script>
        const slider = document.getElementById("ratioSlider");
        const val0 = document.getElementById("val0");
        const val1 = document.getElementById("val1");

        // Cập nhật con số hiển thị khi gạt thanh slider
        slider.oninput = function() {
            val0.innerText = 6 - this.value;
            val1.innerText = this.value;
        }

        function generateRandom() {
            const num1 = parseInt(slider.value);
            const num0 = 6 - num1;
            
            let pool = [];
            for (let i = 0; i < num0; i++) pool.push(0);
            for (let i = 0; i < num1; i++) pool.push(1);

            // Xáo trộn mảng ngẫu nhiên
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // Hiển thị kết quả vào các ô vuông
            for (let i = 0; i < 6; i++) {
                const box = document.getElementById(`box${i}`);
                box.innerText = "";
                box.classList.remove('pop');
                
                // Hiệu ứng xuất hiện lần lượt
                setTimeout(() => {
                    box.innerText = pool[i];
                    box.classList.add('pop');
                }, i * 40);
            }
        }

        // Tự động tạo lần đầu khi load trang
        window.onload = generateRandom;
    </script>
</body>
</html>
